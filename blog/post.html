(function () {
  var params = new URLSearchParams(window.location.search);
  var id     = params.get('id');
  var post   = id && POSTS[id];

  if (!post) {
    document.getElementById('post-header').innerHTML =
      '<h1 class="blog-post-title">글을 찾을 수 없습니다.</h1>';
    document.getElementById('post-body').innerHTML =
      '<p><a href="index.html">← 블로그 목록으로 돌아가기</a></p>';
    document.getElementById('related-posts').style.display = 'none';
    return;
  }

  /* 페이지 메타 */
  document.title = post.title + ' — 비트코인 계산기';
  var metaDesc = document.getElementById('meta-desc');
  if (metaDesc) metaDesc.setAttribute('content', post.desc);

  /* 헤더 */
  document.getElementById('post-header').innerHTML =
    '<span class="blog-tag blog-post-tag">' + post.tag + '</span>' +
    '<h1 class="blog-post-title">' + post.title + '</h1>' +
    '<div class="blog-post-meta">' +
      '<span>' + post.date + '</span>' +
      '<span>' + post.readTime + '</span>' +
    '</div>';

  /* 본문 */
  document.getElementById('post-body').innerHTML = post.html;

  /* 관련 글 — 현재 글 제외 최대 2개 */
  var related = Object.keys(POSTS).filter(function (k) { return k !== id; }).slice(0, 2);
  document.getElementById('related-posts').innerHTML = related.map(function (k) {
    var p = POSTS[k];
    return '<a class="blog-card" href="post.html?id=' + k + '">' +
      '<span class="blog-tag">' + p.tag + '</span>' +
      '<div class="blog-card-title">' + p.title + '</div>' +
      '<div class="blog-card-meta"><span>' + p.date + '</span></div>' +
    '</a>';
  }).join('');
})();
