      <h2>김치 프리미엄이란?</h2>

      <p>반면 시장 침체기에는 프리미엄이 마이너스(역프리미엄)를 기록하기도 합니다. 국내 매도 압력이 강하거나 외국인 수요가 높을 때 발생합니다.</p>

      <p>한국 투자자들의 매수 심리가 강할 때는 국내 수요가 집중되어 업비트 가격이 바이낸스보다 높아집니다. 반대로 국내 매도 압력이 강할 때는 역프리미엄이 발생하기도 합니다.</p>

    return '<a class="blog-card" href="post.html?id=' + k + '">' +
      '<span class="blog-tag">' + p.tag + '</span>' +
      '<div class="blog-card-title">' + p.title + '</div>' +
      '<div class="blog-card-meta"><span>' + p.date + '</span></div>' +
    '</a>';
  }).join('');
})();
</script>
